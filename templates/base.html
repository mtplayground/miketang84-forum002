<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}miketang84-forum002{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/app.css">
  </head>
  <body class="min-h-screen bg-paper text-ink antialiased">
    <header class="border-b border-border bg-white/90 backdrop-blur">
      <div class="shell flex items-center justify-between py-6">
        <h1 class="text-2xl font-semibold tracking-tight">
          <a class="transition hover:text-accent" href="/">miketang84-forum002</a>
        </h1>
        <nav aria-label="Primary" class="flex items-center gap-4 text-sm font-medium">
          <a class="rounded-full bg-accentSoft px-4 py-2 text-accent transition hover:bg-teal-200" href="/">Home</a>
          <a class="rounded-full border border-border px-4 py-2 text-slate-700 transition hover:border-accent hover:text-accent" href="/register">Register</a>
          <a class="rounded-full border border-border px-4 py-2 text-slate-700 transition hover:border-accent hover:text-accent" href="/login">Login</a>
          <form action="/logout" method="post">
            {% include "_csrf_input.html" %}
            <button class="rounded-full border border-border px-4 py-2 text-slate-700 transition hover:border-accent hover:text-accent" type="submit">
              Logout
            </button>
          </form>
        </nav>
      </div>
    </header>

    <main class="shell py-12">
      <section aria-label="Flash messages" class="mb-8">
        {% block flash_messages %}
        <div class="rounded-2xl border border-dashed border-border bg-white/70 px-4 py-3 text-sm text-slate-600">
          No flash messages.
        </div>
        {% endblock %}
      </section>

      <section class="rounded-[2rem] border border-border bg-white px-8 py-10 shadow-sm">
        {% block content %}
        {% endblock %}
      </section>
    </main>

    <footer class="shell pb-10 text-sm text-slate-500">
      <small>Powered by Axum, Askama, PostgreSQL, and Tailwind CSS.</small>
    </footer>
  </body>
</html>
