{% extends "base.html" %}

{% block title %}{{ status_code }} | {{ title }}{% endblock %}

{% block flash_messages %}
<div class="rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
  Something went wrong while handling this request.
</div>
{% endblock %}

{% block content %}
<div class="space-y-4">
  <p class="text-sm font-semibold uppercase tracking-[0.3em] text-red-700">Error {{ status_code }}</p>
  <h2 class="text-4xl font-semibold tracking-tight text-slate-900">{{ title }}</h2>
  <p class="max-w-2xl text-lg leading-8 text-slate-600">{{ message }}</p>
</div>
{% endblock %}
