version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://forum:forum@postgres:5432/forum002
      BIND_ADDR: 0.0.0.0:8080
      SESSION_SECRET: local-development-secret
      EDIT_WINDOW_MINUTES: "15"
      RUST_LOG: miketang84_forum002=debug,tower_http=info
    ports:
      - "8080:8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: forum002
      POSTGRES_USER: forum
      POSTGRES_PASSWORD: forum
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forum -d forum002"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
